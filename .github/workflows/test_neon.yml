name: Test (Neon)

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      min-node-version: 18
      cache: true
      neon: true
      skip: linux-ia32
      package-manager: yarn
      target-name: test
      directory-path: ./test/neon
